capabilities:
  # ----------------------------------------------------------------
  # 1. AI Worker: Whisper
  # Requires PyTorch, CUDA, FFmpeg
  # ----------------------------------------------------------------
  - name: whisper-local
    env_name: test-whisper-auto
    
    # Environment File (System Deps)
    env_file: "https://raw.githubusercontent.com/cj-mills/cjm-transcription-plugin-whisper/main/environment.yml"
    
    # The Capability Package
    package: "git+https://github.com/cj-mills/cjm-transcription-plugin-whisper.git"
    
    # Interface Libraries
    interface_libs:
      - "git+https://github.com/cj-mills/cjm-substrate.git"
      - "git+https://github.com/cj-mills/cjm-transcription-plugin-system.git"

  # ----------------------------------------------------------------
  # 2. Infrastructure Worker: NVIDIA Monitor
  # Requires nvitop, lightweight python env
  # ----------------------------------------------------------------
  - name: sys-mon-nvidia
    env_name: test-sys-mon
    
    # Environment File (System Deps)
    env_file: "https://raw.githubusercontent.com/cj-mills/cjm-system-monitor-nvidia/main/environment.yml"
    
    # The Capability Package
    package: "git+https://github.com/cj-mills/cjm-system-monitor-nvidia.git"
    
    # Interface Libraries
    # Note: Requires cjm-infra-plugin-system for the SystemStats DTO
    interface_libs:
      - "git+https://github.com/cj-mills/cjm-substrate.git"
      - "git+https://github.com/cj-mills/cjm-infra-plugin-system.git"


  # ----------------------------------------------------------------
  # 3. AI Worker: Voxtral HF
  # Requires PyTorch, CUDA, FFmpeg
  # ----------------------------------------------------------------
  - name: voxtral-hf
    env_name: test-voxtral-hf
    
    # Environment File (System Deps)
    env_file: "https://raw.githubusercontent.com/cj-mills/cjm-transcription-plugin-voxtral-hf/main/environment.yml"
    
    # The Capability Package
    package: "git+https://github.com/cj-mills/cjm-transcription-plugin-voxtral-hf.git"
    
    # Interface Libraries
    interface_libs:
      - "git+https://github.com/cj-mills/cjm-substrate.git"
      - "git+https://github.com/cj-mills/cjm-transcription-plugin-system.git"


  # ----------------------------------------------------------------
  # 5. AI Worker: Gemini API Transcription
  # Requires FFmpeg
  # ----------------------------------------------------------------
  - name: gemini-transcription
    env_name: test-gemini-transcription
    
    # Environment File (System Deps)
    env_file: "https://raw.githubusercontent.com/cj-mills/cjm-transcription-plugin-gemini/main/environment.yml"
    
    # The Capability Package
    package: "git+https://github.com/cj-mills/cjm-transcription-plugin-gemini.git"
    
    # Interface Libraries
    interface_libs:
      - "git+https://github.com/cj-mills/cjm-substrate.git"
      - "git+https://github.com/cj-mills/cjm-transcription-plugin-system.git"


  # ----------------------------------------------------------------
  # 6. Knowledge Worker: SQLite Context Graph
  # Lightweight, no GPU required
  # ----------------------------------------------------------------
  - name: sqlite-graph
    env_name: test-graph-sqlite
    
    # Environment File
    env_file: "https://raw.githubusercontent.com/cj-mills/cjm-graph-plugin-sqlite/main/environment.yml"
    
    # The Capability Package
    package: "git+https://github.com/cj-mills/cjm-graph-plugin-sqlite.git"
    
    # Interface Libraries
    interface_libs:
      - "git+https://github.com/cj-mills/cjm-substrate.git"
      - "git+https://github.com/cj-mills/cjm-graph-plugin-system.git"
    # Adapter impls this worker env carries (stage-6 J10: install-all
    # pip-installs `lib` into the env + generates the adapter manifest --
    # the I6/J8 manual steps now ride the pipeline)
    adapters:
      - lib: "git+https://github.com/cj-mills/cjm-graph-storage-adapter-interface.git"
        impl: "cjm_graph_storage_adapter_interface.generic:GenericGraphStorageAdapter"


  # ----------------------------------------------------------------
  # 7. Media Analysis: Silero VAD
  # CPU-based speech detection
  # ----------------------------------------------------------------
  - name: silero-vad
    env_name: test-silero-vad
    
    # Environment File
    env_file: "https://raw.githubusercontent.com/cj-mills/cjm-media-plugin-silero-vad/main/environment.yml"
    
    # The Capability Package
    package: "git+https://github.com/cj-mills/cjm-media-plugin-silero-vad.git"
    
    # Interface Libraries
    interface_libs:
      - "git+https://github.com/cj-mills/cjm-substrate.git"
      - "git+https://github.com/cj-mills/cjm-media-plugin-system.git"

  # ----------------------------------------------------------------
  # 8. Text Processing: NLTK
  # Sentence splitting and tokenization
  # ----------------------------------------------------------------
  - name: nltk-text
    env_name: test-nltk
    
    # Environment File
    env_file: "https://raw.githubusercontent.com/cj-mills/cjm-text-plugin-nltk/main/environment.yml"
    
    # The Capability Package
    package: "git+https://github.com/cj-mills/cjm-text-plugin-nltk.git"
    
    # Interface Libraries
    interface_libs:
      - "git+https://github.com/cj-mills/cjm-substrate.git"
      - "git+https://github.com/cj-mills/cjm-text-plugin-system.git"